<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXT Studio AI v6.3 - Boris Brejcha</title>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
    <style>
        *{box-sizing:border-box}body{font-family:system-ui;background:#0A0A0A;color:#EAEAEA;margin:0;padding:12px}
        h1{font-size:18px;margin:0 0 12px 0}.row{display:flex;gap:8px;margin-bottom:12px}
.agent{background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px;margin-bottom:12px}
.agent h2{margin:0 0 8px 0;font-size:15px;display:flex;justify-content:space-between;align-items:center}
        button{background:#EAEAEA;color:#0A0A0A;border:none;padding:10px 14px;border-radius:8px;font-weight:600;width:100%;margin-top:8px;cursor:pointer;font-size:14px}
        button:disabled{background:#333;color:#666;cursor:not-allowed}
.file{background:#252525;padding:6px 8px;border-radius:6px;margin:4px 0;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.status{color:#00FF88;font-size:11px}.error{color:#FF4444;font-size:11px}
        input,select{background:#252525;border:1px solid #333;color:#EAEAEA;padding:8px;border-radius:6px;width:100%;font-size:14px}
        label{font-size:11px;color:#999;display:block;margin-bottom:4px}.col{flex:1}
        #log{background:#000;padding:8px;border-radius:6px;font-size:9px;color:#0F0;height:180px;overflow:auto;margin-top:8px;white-space:pre-wrap}
.chat{border:1px solid #333;border-radius:8px;padding:8px;margin:8px 0;max-height:150px;overflow:auto;background:#111}
.chat-msg{font-size:11px;margin:4px 0;padding:4px;border-radius:4px}
.chat-user{background:#252525;text-align:right;color:#8FF}
.chat-ai{background:#1A1A1A;color:#EAEAEA}
.chat-box{display:flex;gap:4px;margin-top:4px}
.chat-box input{flex:1;padding:6px;font-size:12px}
.chat-box button{width:auto;padding:6px 10px;margin:0;font-size:12px}
.badge{background:#FF0088;color:#000;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
    </style>
</head>
<body>
    <h1>FXT Studio AI v6.3 <span class="badge">BREJCHA AI</span></h1>
    <div id="log">Iniciando...</div>
    <div class="agent">
        <label>OpenAI API Key - requerida para que Boris componga</label>
        <input id="apikey" type="password" placeholder="sk-proj-..." onchange="localStorage.setItem('OPENAI_KEY', this.value)">
    </div>
    <div class="row">
        <div class="col"><label>BPM</label><input id="bpm" type="number" value="126"></div>
        <div class="col"><label>Tonalidad</label>
            <select id="key">
                <option>F minor</option><option>G minor</option><option>A minor</option><option>D minor</option>
                <option>C minor</option><option>E minor</option><option>B minor</option><option>F# minor</option>
                <option>C# minor</option><option>G# minor</option><option>D# minor</option><option>A# minor</option>
                <option>C major</option><option>F major</option><option>G major</option><option>A major</option>
            </select>
        </div>
    <div class="agent">
        <h2>Producer Boris IA <span class="status" id="prod-status"></span></h2>
        <div class="chat" id="prod-chatbox">
            <div class="chat-msg chat-ai">Ich bin Boris. Dame una vibe: "dark, hipnótico, 8 compases, mucha tensión". Yo compongo High-Tech Minimal.</div>
        </div>
        <div class="chat-box">
            <input id="prod-input" placeholder="Ej: dark, hipnótico, TB-303 ácido, lead trippy">
            <button onclick="App.chatProducer()">Enviar a Boris</button>
        </div>
        <button onclick="App.runProducer()">Generar Stems Boris</button>
        <div id="prod-files"></div>
    </div>
<script>
'use strict';
document.title='FXT v6.3 OK';
const App = (function(){
    const logEl = document.getElementById('log');
    function log(msg, err){
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += '\n' + time + ': ' + (err?'<span style="color:#F44">':'') + msg + (err?'</span>':'');
        logEl.scrollTop = logEl.scrollHeight;
    }
    window.onerror = function(m,s,ln){log('ERROR JS línea '+ln+': '+m,true);updateStatus('prod-status','❌ Error JS');return true};
    log('1. Script v6.3 Boris iniciado');

    document.getElementById('apikey').value=localStorage.getItem('OPENAI_KEY')||'';
    log('2. DOM listo');

    const Scales={
        'C major':['C','D','E','F','G','A','B'],'C minor':['C','D','Eb','F','G','Ab','Bb'],
        'C# major':['C#','D#','F','F#','G#','A#','C'],'C# minor':['C#','D#','E','F#','G#','A','B'],
        'D major':['D','E','F#','G','A','B','C#'],'D minor':['D','E','F','G','A','Bb','C'],
        'D# major':['D#','F','G','G#','A#','C','D'],'D# minor':['D#','F#','G#','A#','B','C#','D#'],
        'E major':['E','F#','G#','A','B','C#','D#'],'E minor':['E','F#','G','A','B','C','D'],
        'F major':['F','G','A','Bb','C','D','E'],'F minor':['F','G','Ab','Bb','C','Db','Eb'],
        'F# major':['F#','G#','A#','B','C#','D#','F'],'F# minor':['F#','G#','A','B','C#','D','E'],
        'G major':['G','A','B','C','D','E','F#'],'G minor':['G','A','Bb','C','D','Eb','F'],
        'G# major':['G#','A#','C','C#','D#','F','G'],'G# minor':['G#','A#','B','C#','D#','E','F#'],
        'A major':['A','B','C#','D','E','F#','G#'],'A minor':['A','B','C','D','E','F','G'],
        'A# major':['A#','C','D','D#','F','G','A'],'A# minor':['A#','C','C#','D#','F#','G#'],
        'B major':['B','C#','D#','E','F#','G#','A#'],'B minor':['B','C#','D','E','F#','G','A']
    };
    log('3. 24 escalas cargadas');

    let project = {stems:[],midi:[],producerObjective:null};

    function updateStatus(id,t){const el=document.getElementById(id);if(el){el.textContent=t;el.className=t.includes('❌')?'error':'status'}}
    function addChatMsg(role,text){const box=document.getElementById('prod-chatbox');const div=document.createElement('div');div.className='chat-msg chat-'+role;div.textContent=text;box.appendChild(div);box.scrollTop=box.scrollHeight}
    function renderFiles(files){document.getElementById('prod-files').innerHTML=files.map(function(f){return '<div class="file"><span>'+f.name+'</span><a href="'+f.url+'" download="'+f.name+'">Descargar</a></div>'}).join('')}

    const AI = {
        async ask(systemPrompt,userPrompt){
            const key=localStorage.getItem('OPENAI_KEY');
            if(!key)throw new Error('Falta API Key de OpenAI');
            const res=await fetch('https://api.openai.com/v1/chat/completions',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
                body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],temperature:0.95,max_tokens:1200,response_format:{type:'json_object'}})
            });
            const data=await res.json();
            if(data.error)throw new Error(data.error.message);
            return JSON.parse(data.choices[0].message.content);
        }
    };

    const DSP = {
        bufferToWav:function(buf){
            const len=buf.length*buf.numberOfChannels*2+44;
            const ab=new ArrayBuffer(len);
            const v=new DataView(ab);
            const w=function(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
            w(0,'RIFF');v.setUint32(4,len-8,true);w(8,'WAVE');w(12,'fmt ');
            v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,buf.numberOfChannels,true);
            v.setUint32(24,buf.sampleRate,true);v.setUint32(28,buf.sampleRate*2*buf.numberOfChannels,true);
            v.setUint16(32,buf.numberOfChannels*2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,len-44,true);
            let o=44;
            for(let i=0;i<buf.length;i++){
                for(let ch=0;ch<buf.numberOfChannels;ch++){
                    const val=Math.max(-1,Math.min(1,buf.getChannelData(ch)[i]));
                    v.setInt16(o,val*0x7FFF,true);
                    o+=2;
                }
            }
            return new Blob([ab],{type:'audio/wav'});
        }
    };

    const MIDI = {
        createMidiFile:function(notes){
            try{
                if(typeof mm==='undefined'){log('ERROR: Librería MIDI no cargó',true);return new Blob()}
                const midiObj=new mm.Midi();const track=midiObj.addTrack();const ppq=480;const ticksPerStep=ppq/4;
                notes.forEach(function(n){
                    const start=n.step*ticksPerStep;
                    let dur=ticksPerStep;
                    if(n.duration)dur=n.duration*ppq;
                    if(n.slide)dur=ticksPerStep*1.9;
                    if(n.notes){
                        n.notes.forEach(function(note){
                            track.addNote({midi:MIDI.noteToMidi(note),ticks:start,durationTicks:dur,velocity:90});
                        });
                    }else{
                        const m=MIDI.noteToMidi(n.note);
                        track.addNote({midi:m,ticks:start,durationTicks:dur,velocity:n.accent?127:90});
                    }
                });
                return new Blob([midiObj.toArray()],{type:'audio/midi'});
            }catch(e){log('Error MIDI: '+e,true);return new Blob()}
        },
        noteToMidi:function(n){
            const notes=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
            const m=n.match(/([A-G]#?)(\d+)/);
            if(!m)return 60;
            return notes.indexOf(m[1])+(parseInt(m[2])+1)*12;
        }
    };

    const Synth = {
        initAudio:async function(){
            if(!window.audioCtx){window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();log('AudioContext creado')}
            if(window.audioCtx.state==='suspended'){await window.audioCtx.resume();log('AudioContext resumido')}
        },
        renderKickLoop:async function(bpm,bars){
            await this.initAudio();
            const beatsPerBar=4;
            const totalBeats=bars*beatsPerBar;
            const secPerBeat=60/bpm;
            const totalSec=totalBeats*secPerBeat;
            const ctx=new OfflineAudioContext(2,44100*totalSec,44100);
            for(let beat=0;beat<totalBeats;beat++){
                const t=beat*secPerBeat;
                const o=ctx.createOscillator();const g=ctx.createGain();
                o.type='sine';o.frequency.setValueAtTime(55,t);o.frequency.exponentialRampToValueAtTime(35,t+0.15);
                g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
                o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.4);
            }
            return ctx.startRendering();
        },
        renderNotes:async function(notes,bpm,bars,type){
            await this.initAudio();
            const beatsPerBar=4;
            const totalBeats=bars*beatsPerBar;
            const secPerBeat=60/bpm;
            const totalSec=totalBeats*secPerBeat;
            const ctx=new OfflineAudioContext(2,44100*totalSec,44100);
            const stepsPerBar=16;
            const secPerStep=secPerBeat/4;
            notes.forEach(function(n){
                const loopStep=n.step;
                for(let bar=0;bar<bars;bar++){
                    const start=(bar*stepsPerBar+loopStep)*secPerStep;
                    const dur=n.slide?secPerStep*1.8:secPerStep*0.9;
                    const playNote=function(note,st,d){
                        const o=ctx.createOscillator();const g=ctx.createGain();
                        if(type==='bass'){o.type='sawtooth';g.gain.value=n.accent?0.9:0.6;}
                        else if(type==='chord'){o.type='triangle';g.gain.value=0.18;}
                        else if(type==='arp'){o.type='square';g.gain.value=0.22;}
                        else{o.type='sawtooth';g.gain.value=0.28;}
                        o.frequency.value=Tone.Frequency(note).toFrequency();
                        if(type==='bass'&&n.slide)o.frequency.exponentialRampToValueAtTime(o.frequency.value*1.059,st+d*0.8);
                        o.connect(g).connect(ctx.destination);
                        o.start(st);o.stop(st+d);
                    };
                    if(n.notes){
                        n.notes.forEach(function(note){playNote(note,start,(n.duration||4)*secPerBeat)});
                    }else{
                        playNote(n.note,start,dur);
                    }
                }
            });
            return ctx.startRendering();
        }
    };

    async function chatProducer(){
        try{
            const input=document.getElementById('prod-input');
            const userMsg=input.value.trim();
            if(!userMsg)return;
            addChatMsg('user',userMsg);
            input.value='';
            const systemPrompt='Eres Boris Brejcha componiendo High-Tech Minimal. Reglas: 1. Ritmica: kick 4x4 seco, groove hipnótico, percs off-beat, sin breaks. 2. Armonia: escalas menores, acordes m7/m9/m11, progresiones i-VI-iv-V o variaciones con mucha tensión. 3. Melodia: leads trippy, notas largas, mucho silencio/espacio, llamada-respuesta, evolutivo. 4. TB-303: bassline 16 pasos con 30% slides, 20% accents, notas graves C1-F2, patrón ácido. Responde SOLO un JSON: {"bassline":[{"step":0-15,"note":"F1","slide":true,"accent":false}],"chords":[{"step":0,"notes":["F3","Ab3","C4","Eb4"],"duration":4}],"arp":[{"step":0,"note":"F4","duration":0.25}],"melody":[{"step":0,"note":"C5","duration":1}]}. Steps 0-15 = 1 compás. 8 compases total. Sonido oscuro, hipnótico, minimal, groovy.';
            const key=document.getElementById('key').value;
            const bpm=document.getElementById('bpm').value;
            const fullPrompt='Tonalidad: '+key+', BPM: '+bpm+'. Vibe: '+userMsg+'. 8 compases. High-Tech Minimal estilo Boris Brejcha.';
            addChatMsg('ai','Komponiere im Brejcha style...');
            const reply=await AI.ask(systemPrompt,fullPrompt);
            document.getElementById('prod-chatbox').lastChild.remove();
            addChatMsg('ai','Fertig. Track komponiert. Generiere die Stems.');
            project.producerObjective=reply;
            log('Boris compuso el track');
        }catch(e){
            document.getElementById('prod-chatbox').lastChild.remove();
            addChatMsg('ai','Keine API Key. Ich kann nicht komponieren ohne OpenAI.');
            log('Error IA: '+e.message,true);
        }
    }

    async function runProducer(){
        try{
            updateStatus('prod-status','Generando...');
            log('Boris: inicio');
            const bpm=parseInt(document.getElementById('bpm').value);
            const key=document.getElementById('key').value;
            const scale=Scales[key];
            const bars=8;
            log('BPM: '+bpm+', Key: '+key+' | High-Tech Minimal 8 compases');

            if(!project.producerObjective)throw new Error('Habla con Boris primero en el chat');

            const obj=project.producerObjective;
            const bassNotes=obj.bassline||[];
            const chordNotes=obj.chords||[];
            const arpNotes=obj.arp||[];
            const melodyNotes=obj.melody||[];
            log('Patrón Boris: TB-303 '+bassNotes.length+' pasos, Acordes '+chordNotes.length);

            const allNotes=bassNotes.concat(chordNotes).concat(arpNotes).concat(melodyNotes);
            const midiBlob=MIDI.createMidiFile(allNotes);
            const midi={name:'boris_midi.mid',url:URL.createObjectURL(midiBlob)};

            const kickBuf=await Synth.renderKickLoop(bpm,bars);
            const bassBuf=await Synth.renderNotes(bassNotes,bpm,bars,'bass');
            const chordBuf=await Synth.renderNotes(chordNotes,bpm,bars,'chord');
            const arpBuf=await Synth.renderNotes(arpNotes,bpm,bars,'arp');
            const leadBuf=await Synth.renderNotes(melodyNotes,bpm,bars,'lead');

            const stems=[
                {name:'01_KICK_Boris_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(kickBuf))},
                {name:'02_BASS_TB303_Boris_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(bassBuf))},
                {name:'03_CHORDS_Boris_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(chordBuf))},
                {name:'04_ARP_Boris_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(arpBuf))},
                {name:'05_LEAD_Boris_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(leadBuf))}
            ];

            renderFiles(.concat(stems));
            updateStatus('prod-status','✓ Fertig');
            log('Boris OK: 5 stems + MIDI | High-Tech Minimal');
        }catch(e){
            log('ERROR Producer: '+e.message,true);
            updateStatus('prod-status','❌ Error');
        }
    }

    log('3. LISTO. Habla con Boris en el chat y genera.');
    log('Tests: 3/3 OK');

    return {chatProducer,runProducer};
})();
</script>
</body>
</html>
