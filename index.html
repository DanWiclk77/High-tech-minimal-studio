<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB-303 Bass Line Emulator</title>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <style>
        *{box-sizing:border-box;user-select:none}body{font-family:system-ui;background:#D3D3D3;color:#222;margin:0;padding:8px;display:flex;justify-content:center}
       .tb303{background:linear-gradient(to bottom,#E8E8E8,#C0C0C0);border:3px solid #888;border-radius:8px;padding:12px;width:100%;max-width:800px;box-shadow:0 8px 32px #0008}
       .header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #888;padding-bottom:8px;margin-bottom:8px}
       .logo{font-size:24px;font-weight:900;letter-spacing:-1px}.model{font-size:18px;font-weight:700;text-align:right}
       .top-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-end}
       .knob-group{display:flex;flex-direction:column;align-items:center;gap:4px}
       .knob{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#555,#222);border:2px solid #111;position:relative;cursor:pointer}
       .knob::after{content:'';position:absolute;width:3px;height:15px;background:#DDD;top:5px;left:50%;transform:translateX(-50%);transform-origin:50% 20px}
       .knob-label{font-size:9px;font-weight:700;text-align:center;line-height:1}
       .selector{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#666,#333);border:3px solid #111;position:relative;cursor:pointer}
       .selector::after{content:'';position:absolute;width:4px;height:20px;background:#FFF;top:5px;left:50%;transform:translateX(-50%);transform-origin:50% 25px}
       .big-knob{width:70px;height:70px}.big-knob::after{height:25px;transform-origin:50% 30px}
       .seq-section{border:2px solid #888;padding:8px;background:#D8D8D8;border-radius:4px}
       .pitch-row{display:flex;gap:2px;margin-bottom:4px}
       .key{width:24px;height:40px;background:#222;border:1px solid #000;position:relative;cursor:pointer}
       .key.white{background:#F0F0F0}.key.active{background:#FF0088}
       .led{width:6px;height:6px;border-radius:50%;background:#400;position:absolute;top:2px;left:50%;transform:translateX(-50%)}
       .led.on{background:#F00;box-shadow:0 0 6px #F00}
       .step-row{display:flex;gap:2px;margin-bottom:2px}
       .step-btn{width:24px;height:24px;background:#B0B0B0;border:1px solid #666;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
       .step-btn.active{background:#FF0088;color:#000}.step-btn.current{outline:2px solid #0F0}
       .controls{display:flex;gap:8px;margin-top:8px}
       .btn{flex:1;padding:12px;background:#444;color:#FFF;border:2px solid #222;border-radius:4px;font-weight:700;cursor:pointer;font-size:12px}
       .btn:active{background:#666}.btn.run{background:#0A0}.btn.stop{background:#A00}
       .display{background:#001100;color:#0F0;font-family:monospace;padding:8px;text-align:center;font-size:14px;border:2px inset #666;margin:8px 0}
       .accent-btn{background:#B0B0B0}.accent-btn.on{background:#FF0088}
       .slide-btn{background:#B0B0B0}.slide-btn.on{background:#FF0088}
        input[type="range"]{width:100%;margin:4px 0}
       .value{font-size:10px;color:#000;font-weight:700}
    </style>
</head>
<body>
    <div class="tb303">
        <div class="header">
            <div class="logo">Roland</div>
            <div class="model">TB-303<br><span style="font-size:10px">Bass Line Computer Controlled</span></div>
        </div>

        <div class="top-row">
            <div class="knob-group">
                <div class="knob" id="tempo" data-val="126"></div>
                <div class="knob-label">TEMPO<br><span class="value" id="tempo-val">126</span></div>
            </div>
            <div class="knob-group">
                <div class="selector" id="waveform" data-val="sawtooth"></div>
                <div class="knob-label">WAVEFORM<br><span class="value" id="wave-val">SAW</span></div>
            </div>
            <div class="knob-group">
                <div class="knob" id="cutoff" data-val="800"></div>
                <div class="knob-label">CUT OFF<br>FREQ<br><span class="value" id="cutoff-val">800</span></div>
            </div>
            <div class="knob-group">
                <div class="knob" id="resonance" data-val="5"></div>
                <div class="knob-label">RESONANCE<br><span class="value" id="reso-val">5</span></div>
            </div>
            <div class="knob-group">
                <div class="knob" id="envmod" data-val="2000"></div>
                <div class="knob-label">ENV MOD<br><span class="value" id="env-val">2000</span></div>
            </div>
            <div class="knob-group">
                <div class="knob" id="decay" data-val="0.3"></div>
                <div class="knob-label">DECAY<br><span class="value" id="decay-val">0.3</span></div>
            </div>
            <div class="knob-group">
                <div class="knob" id="accent" data-val="0.5"></div>
                <div class="knob-label">ACCENT<br><span class="value" id="accent-val">0.5</span></div>
            </div>
            <div class="knob-group">
                <div class="knob big-knob" id="volume" data-val="0.8"></div>
                <div class="knob-label">VOLUME<br><span class="value" id="vol-val">80%</span></div>
            </div>
        </div>

        <div class="seq-section">
            <div class="display" id="display">PATT 1 | STEP 01 | C3</div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:9px;font-weight:700">
                <span>PITCH MODE</span><span>TIME MODE</span>
            </div>
            <div class="pitch-row" id="pitch-keys"></div>
            <div class="step-row" id="step-accent"></div>
            <div class="step-row" id="step-slide"></div>
            <div class="step-row" id="step-select"></div>
            <div class="controls">
                <button class="btn" id="write-btn">WRITE</button>
                <button class="btn run" id="run-btn">RUN/STOP</button>
                <button class="btn" id="clear-btn">CLEAR</button>
                <button class="btn" id="rec-btn">REC WAV</button>
            </div>
        </div>
    </div>

<script>
'use strict';
const TB303 = (function(){
    let ctx, synth, filter, env, isPlaying=false, isRecording=false;
    let currentStep=0, pattern=[], recorder, recording;
    let params={tempo:126,waveform:'sawtooth',cutoff:800,resonance:5,envmod:2000,decay:0.3,accent:0.5,volume:0.8};
    let writeMode=false, selectedStep=0;

    const notes=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const octaves=[1,2,3];

    function initPattern(){
        pattern=[];
        for(let i=0;i<16;i++){
            pattern.push({note:'C2',accent:false,slide:false,active:false});
        }
    }

    function setupAudio(){
        ctx = new (window.AudioContext||window.webkitAudioContext)();
        synth = new Tone.MonoSynth({
            oscillator:{type:params.waveform},
            filter:{Q:params.resonance,type:'lowpass',rolloff:-24},
            envelope:{attack:0.001,decay:params.decay,sustain:0,release:0.1},
            filterEnvelope:{attack:0.001,decay:params.decay,sustain:0,release:0.1,baseFrequency:params.cutoff,octaves:4}
        }).toDestination();
        synth.volume.value=Tone.gainToDb(params.volume);
        recorder = new Tone.Recorder();
        synth.connect(recorder);
    }

    function updateKnob(knob,value,min,max){
        const pct=(value-min)/(max-min);
        const deg=pct*270-135;
        knob.style.transform='rotate('+deg+'deg)';
    }

    function setupKnobs(){
        document.querySelectorAll('.knob').forEach(knob=>{
            const id=knob.id;
            let min=0,max=1;
            if(id==='tempo'){min=60;max=200}
            else if(id==='cutoff'){min=100;max=8000}
            else if(id==='resonance'){min=0;max=15}
            else if(id==='envmod'){min=0;max=8000}
            else if(id==='decay'){min=0.05;max=2}
            else if(id==='accent'){min=0;max=1}
            else if(id==='volume'){min=0;max=1}

            updateKnob(knob,params[id],min,max);

            let dragging=false;
            knob.addEventListener('mousedown',e=>{dragging=true;e.preventDefault()});
            document.addEventListener('mouseup',()=>dragging=false);
            document.addEventListener('mousemove',e=>{
                if(!dragging)return;
                const rect=knob.getBoundingClientRect();
                const cy=rect.top+rect.height/2;
                const dy=cy-e.clientY;
                const val=Math.max(min,Math.min(max,params[id]+dy*0.01*(max-min)));
                params[id]=val;
                updateKnob(knob,val,min,max);
                updateDisplay();
                updateSynth();
            });
        });

        document.getElementById('waveform').addEventListener('click',function(){
            params.waveform=params.waveform==='sawtooth'?'square':'sawtooth';
            document.getElementById('wave-val').textContent=params.waveform==='sawtooth'?'SAW':'SQR';
            this.style.transform=params.waveform==='sawtooth'?'rotate(-45deg)':'rotate(45deg)';
            updateSynth();
        });
    }

    function updateDisplay(){
        document.getElementById('tempo-val').textContent=Math.round(params.tempo);
        document.getElementById('cutoff-val').textContent=Math.round(params.cutoff);
        document.getElementById('reso-val').textContent=params.resonance.toFixed(1);
        document.getElementById('env-val').textContent=Math.round(params.envmod);
        document.getElementById('decay-val').textContent=params.decay.toFixed(2);
        document.getElementById('accent-val').textContent=params.accent.toFixed(2);
        document.getElementById('vol-val').textContent=Math.round(params.volume*100)+'%';
    }

    function updateSynth(){
        if(!synth)return;
        synth.oscillator.type=params.waveform;
        synth.filter.Q.value=params.resonance;
        synth.filterEnvelope.baseFrequency=params.cutoff;
        synth.filterEnvelope.octaves=params.envmod/1000;
        synth.envelope.decay=params.decay;
        synth.filterEnvelope.decay=params.decay;
        synth.volume.value=Tone.gainToDb(params.volume);
    }

    function setupSequencer(){
        const pitchRow=document.getElementById('pitch-keys');
        const accentRow=document.getElementById('step-accent');
        const slideRow=document.getElementById('step-slide');
        const selectRow=document.getElementById('step-select');

        notes.forEach((note,i)=>{
            const key=document.createElement('div');
            key.className='key '+(note.includes('#')?'':'white');
            key.innerHTML='<div class="led" id="led-'+i+'"></div>';
            key.onclick=()=>{if(writeMode)setPitch(selectedStep,note+'2')};
            pitchRow.appendChild(key);
        });

        for(let i=0;i<16;i++){
            const accBtn=document.createElement('div');
            accBtn.className='step-btn accent-btn';
            accBtn.textContent='A';
            accBtn.onclick=()=>toggleAccent(i);
            accentRow.appendChild(accBtn);

            const slideBtn=document.createElement('div');
            slideBtn.className='step-btn slide-btn';
            slideBtn.textContent='S';
            slideBtn.onclick=()=>toggleSlide(i);
            slideRow.appendChild(slideBtn);

            const selBtn=document.createElement('div');
            selBtn.className='step-btn';
            selBtn.textContent=i+1;
            selBtn.onclick=()=>selectStep(i);
            selectRow.appendChild(selBtn);
        }
        updateSeqDisplay();
    }

    function setPitch(step,note){
        pattern[step].note=note;
        pattern[step].active=true;
        updateSeqDisplay();
    }

    function toggleAccent(step){
        pattern[step].accent=!pattern[step].accent;
        updateSeqDisplay();
    }

    function toggleSlide(step){
        pattern[step].slide=!pattern[step].slide;
        updateSeqDisplay();
    }

    function selectStep(step){
        selectedStep=step;
        updateSeqDisplay();
    }

    function updateSeqDisplay(){
        const steps=document.querySelectorAll('.step-row')[2].children;
        for(let i=0;i<16;i++){
            steps[i].classList.toggle('current',i===selectedStep);
            steps[i].classList.toggle('active',pattern[i].active);
            document.querySelectorAll('.accent-btn')[i].classList.toggle('on',pattern[i].accent);
            document.querySelectorAll('.slide-btn')[i].classList.toggle('on',pattern[i].slide);
        }
        document.getElementById('display').textContent='PATT 1 | STEP '+(selectedStep+1).toString().padStart(2,'0')+' | '+pattern[selectedStep].note;

        notes.forEach((n,i)=>{
            document.getElementById('led-'+i).classList.toggle('on',pattern[selectedStep].note.startsWith(n));
        });
    }

    let loop;
    async function toggleRun(){
        if(!ctx)setupAudio();
        await Tone.start();
        if(isPlaying){
            Tone.Transport.stop();
            Tone.Transport.cancel();
            isPlaying=false;
            document.getElementById('run-btn').textContent='RUN/STOP';
            document.getElementById('run-btn').className='btn run';
            document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('current'));
        }else{
            Tone.Transport.bpm.value=params.tempo;
            currentStep=0;
            loop=new Tone.Loop(time=>{
                playStep(currentStep,time);
                currentStep=(currentStep+1)%16;
            },'16n').start(0);
            Tone.Transport.start();
            isPlaying=true;
            document.getElementById('run-btn').textContent='STOP';
            document.getElementById('run-btn').className='btn stop';
        }
    }

    function playStep(step,time){
        document.querySelectorAll('.step-row')[2].children.forEach((b,i)=>b.classList.toggle('current',i===step));
        const p=pattern[step];
        if(!p.active)return;

        const vel=p.accent?1:0.7;
        const dur=p.slide?'16n':'16n';
        synth.triggerAttackRelease(p.note,dur,time,vel);

        if(p.slide&&step<15){
            const next=pattern[step+1];
            if(next.active){
                synth.frequency.rampTo(Tone.Frequency(next.note).toFrequency(),0.05,time+Tone.Time('16n').toSeconds()*0.5);
            }
        }
    }

    async function toggleRecord(){
        if(!isRecording){
            if(!ctx)setupAudio();
            await Tone.start();
            recording=recorder.start();
            isRecording=true;
            document.getElementById('rec-btn').textContent='STOP REC';
            document.getElementById('rec-btn').style.background='#A00';
        }else{
            const blob=await recorder.stop();
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download='tb303_bassline.wav';a.click();
            isRecording=false;
            document.getElementById('rec-btn').textContent='REC WAV';
            document.getElementById('rec-btn').style.background='#444';
        }
    }

    function clearPattern(){
        initPattern();
        updateSeqDisplay();
    }

    document.getElementById('write-btn').onclick=()=>{writeMode=!writeMode;document.getElementById('write-btn').style.background=writeMode?'#0A0':'#444'};
    document.getElementById('run-btn').onclick=toggleRun;
    document.getElementById('clear-btn').onclick=clearPattern;
    document.getElementById('rec-btn').onclick=toggleRecord;

    initPattern();
    setupKnobs();
    setupSequencer();
    updateDisplay();

    return{runProducer:toggleRun};
})();
</script>
</body>
</html>
