<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TB-303 Web Emulator</title>
<style>
  body {
    background: #1a1a1a;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #ddd;
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
  }
 .tb303 {
    background: linear-gradient(#c8c8c0, #a8a89e);
    width: 900px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6), inset 0 1px 0 #fff6;
    border: 3px solid #333;
  }
 .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    color: #111;
  }
 .logo { font-weight: 900; font-size: 28px; letter-spacing: 1px; }
 .logo span { font-weight: 400; font-size: 14px; margin-left: 8px; }

 .controls {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    margin-bottom: 20px;
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
 .knob-group {
    text-align: center;
  }
 .knob-group label {
    display: block;
    font-size: 11px;
    color: #ccc;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  input[type=range] {
    width: 100%;
    accent-color: #ff4500;
  }
 .value {
    font-size: 10px;
    color: #ff4500;
    margin-top: 4px;
  }

 .switch-row {
    display: flex;
    gap: 20px;
    align-items: center;
    background: #222;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 20px;
  }
 .switch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
  }
  button {
    background: #444;
    border: 1px solid #111;
    color: #eee;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { background: #555; }
  button.active { background: #ff4500; color: #111; }

 .sequencer {
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
 .steps {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }
 .step {
    background: #111;
    border: 1px solid #333;
    padding: 6px 2px;
    text-align: center;
    border-radius: 2px;
  }
 .step.active { background: #ff4500; color: #111; }
 .step.playing { box-shadow: 0 0 8px #ff4500; }
 .step select {
    width: 100%;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    font-size: 11px;
    text-align: center;
  }
 .step input[type=checkbox] {
    margin: 2px 0;
    accent-color: #ff4500;
  }
 .step-labels {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    font-size: 9px;
    text-align: center;
    color: #888;
    margin-bottom: 5px;
  }
 .led-row {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
 .led {
    height: 6px;
    background: #300;
    border-radius: 3px;
  }
 .led.on { background: #f00; box-shadow: 0 0 6px #f00; }
</style>
</head>
<body>
<div class="tb303">
  <div class="header">
    <div class="logo">TB-303<span>Bass Line Synthesizer</span></div>
    <div>
      <button id="runBtn">RUN</button>
      <button id="clearBtn">CLEAR</button>
    </div>
  </div>

  <div class="controls">
    <div class="knob-group">
      <label>Tuning</label>
      <input type="range" id="tune" min="-12" max="12" value="0" step="1">
      <div class="value" id="tuneVal">0</div>
    </div>
    <div class="knob-group">
      <label>Cut Off Freq</label>
      <input type="range" id="cutoff" min="100" max="8000" value="1000" step="10">
      <div class="value" id="cutoffVal">1000</div>
    </div>
    <div class="knob-group">
      <label>Resonance</label>
      <input type="range" id="resonance" min="0" max="30" value="10" step="0.1">
      <div class="value" id="resVal">10.0</div>
    </div>
    <div class="knob-group">
      <label>Env Mod</label>
      <input type="range" id="envmod" min="0" max="8000" value="2000" step="10">
      <div class="value" id="envmodVal">2000</div>
    </div>
    <div class="knob-group">
      <label>Decay</label>
      <input type="range" id="decay" min="0.05" max="2" value="0.3" step="0.01">
      <div class="value" id="decayVal">0.30</div>
    </div>
    <div class="knob-group">
      <label>Accent</label>
      <input type="range" id="accent" min="0" max="1" value="0.5" step="0.01">
      <div class="value" id="accentVal">0.50</div>
    </div>
  </div>

  <div class="switch-row">
    <div class="switch">
      <label>Waveform:</label>
      <button id="sawBtn" class="active">SAW</button>
      <button id="squareBtn">SQUARE</button>
    </div>
    <div class="switch">
      <label>Tempo:</label>
      <input type="range" id="tempo" min="60" max="200" value="120" step="1" style="width:120px">
      <span id="tempoVal" style="width:30px;display:inline-block">120</span>
    </div>
    <div class="switch">
      <label>Distortion:</label>
      <input type="range" id="dist" min="0" max="100" value="0" step="1" style="width:100px">
      <span id="distVal" style="width:30px;display:inline-block">0</span>
    </div>
  </div>

  <div class="sequencer">
    <div class="step-labels">
      <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div>
      <div>9</div><div>10</div><div>11</div><div>12</div><div>13</div><div>14</div><div>15</div><div>16</div>
    </div>
    <div class="led-row" id="leds"></div>
    <div class="steps" id="steps"></div>
    <div style="font-size:10px;color:#888;margin-top:8px;text-align:center">
      NOTA | SLIDE | ACCENT - Selecciona C1 a C3 para cada paso
    </div>
  </div>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let isRunning = false;
let currentStep = 0;
let nextNoteTime = 0;
let waveform = 'sawtooth';
let scheduleTimer;

const params = {
  tune: 0, cutoff: 1000, resonance: 10, envmod: 2000,
  decay: 0.3, accent: 0.5, tempo: 120, dist: 0
};

const notes = ['OFF','C1','C#1','D1','D#1','E1','F1','F#1','G1','G#1','A1','A#1','B1','C2','C#2','D2','D#2','E2','F2','F#2','G2','G#2','A#2','B2','C3'];
const noteFreq = {'C1':32.70,'C#1':34.65,'D1':36.71,'D#1':38.89,'E1':41.20,'F1':43.65,'F#1':46.25,'G1':49.00,'G#1':51.91,'A1':55.00,'A#1':58.27,'B1':61.74,'C2':65.41,'C#2':69.30,'D2':73.42,'D#2':77.78,'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.8,'A2':110.0,'A#2':116.5,'B2':123.5,'C3':130.8};

const seq = Array(16).fill().map(() => ({note: 'OFF', slide: false, accent: false}));

// UI Setup
const stepsDiv = document.getElementById('steps');
const ledsDiv = document.getElementById('leds');
for(let i=0;i<16;i++){
  const step = document.createElement('div');
  step.className = 'step';
  step.innerHTML = `
    <select data-step="${i}">
      ${notes.map(n => `<option value="${n}">${n}</option>`).join('')}
    </select>
    <input type="checkbox" data-step="${i}" data-type="slide" title="Slide">
    <input type="checkbox" data-step="${i}" data-type="accent" title="Accent">
  `;
  stepsDiv.appendChild(step);

  const led = document.createElement('div');
  led.className = 'led';
  ledsDiv.appendChild(led);
}

// Pattern inicial ácido
seq[0] = {note:'C2', slide:false, accent:true};
seq[3] = {note:'C2', slide:true, accent:false};
seq[4] = {note:'F2', slide:false, accent:true};
seq[7] = {note:'D#2', slide:true, accent:false};
seq[8] = {note:'G2', slide:false, accent:false};
seq[11] = {note:'C2', slide:false, accent:true};
seq[12] = {note:'A#1', slide:true, accent:false};
seq[15] = {note:'C2', slide:false, accent:false};

document.querySelectorAll('select').forEach((sel,i) => sel.value = seq[i].note);

// Event listeners
document.querySelectorAll('input[type=range]').forEach(input => {
  input.addEventListener('input', e => {
    const id = e.target.id;
    params[id] = parseFloat(e.target.value);
    document.getElementById(id+'Val').textContent =
      id === 'decay' || id === 'accent' || id === 'resonance'? params[id].toFixed(2) : params[id];
  });
});

document.getElementById('sawBtn').onclick = () => {
  waveform = 'sawtooth';
  document.getElementById('sawBtn').classList.add('active');
  document.getElementById('squareBtn').classList.remove('active');
};
document.getElementById('squareBtn').onclick = () => {
  waveform = 'square';
  document.getElementById('sawBtn').classList.remove('active');
  document.getElementById('squareBtn').classList.add('active');
};

document.querySelectorAll('select').forEach(sel => {
  sel.addEventListener('change', e => {
    seq[e.target.dataset.step].note = e.target.value;
  });
});

document.querySelectorAll('input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', e => {
    seq[e.target.dataset.step][e.target.dataset.type] = e.target.checked;
  });
});

document.getElementById('clearBtn').onclick = () => {
  seq.forEach(s => {s.note='OFF'; s.slide=false; s.accent=false;});
  document.querySelectorAll('select').forEach(sel => sel.value='OFF');
  document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked=false);
};

document.getElementById('runBtn').onclick = async () => {
  if(ctx.state === 'suspended') await ctx.resume();
  isRunning =!isRunning;
  document.getElementById('runBtn').classList.toggle('active');
  document.getElementById('runBtn').textContent = isRunning? 'STOP' : 'RUN';

  if(isRunning) {
    currentStep = 0;
    nextNoteTime = ctx.currentTime + 0.1;
    scheduler();
  } else {
    clearTimeout(scheduleTimer);
    document.querySelectorAll('.led').forEach(led => led.classList.remove('on'));
    document.querySelectorAll('.step').forEach(s => s.classList.remove('playing'));
  }
};

// Audio Engine - emulando el circuito del 303
function create303Voice(freq, time, slide, accent, duration) {
  const osc = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const vca = ctx.createGain();
  const dist = ctx.createWaveShaper();

  osc.type = waveform;
  osc.frequency.value = freq * Math.pow(2, params.tune/12);

  // Distorsión para el crunch ácido
  if(params.dist > 0) {
    const k = params.dist * 10;
    const curve = new Float32Array(44100);
    for(let i=0; i<44100; i++) {
      const x = i * 2 / 44100 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    dist.curve = curve;
    dist.oversample = '4x';
  }

  // Filtro 24dB/oct resonante como el 303 original
  filter.type = 'lowpass';
  filter.Q.value = params.resonance;

  const baseCutoff = params.cutoff;
  const envAmount = params.envmod * (accent? 1 + params.accent : 1);
  const peakCutoff = Math.min(baseCutoff + envAmount, 18000);

  filter.frequency.setValueAtTime(baseCutoff, time);
  filter.frequency.linearRampToValueAtTime(peakCutoff, time + 0.005);
  filter.frequency.exponentialRampToValueAtTime(baseCutoff, time + params.decay);

  // VCA envelope
  const amp = accent? 0.8 : 0.4;
  vca.gain.setValueAtTime(0, time);
  vca.gain.linearRampToValueAtTime(amp, time + 0.003);

  if(slide) {
    vca.gain.setValueAtTime(amp, time + duration - 0.01);
  } else {
    vca.gain.exponentialRampToValueAtTime(0.001, time + params.decay);
  }

  // Conexiones
  if(params.dist > 0) {
    osc.connect(dist).connect(filter).connect(vca).connect(ctx.destination);
  } else {
    osc.connect(filter).connect(vca).connect(ctx.destination);
  }

  osc.start(time);
  osc.stop(time + duration + 0.1);

  return {osc, filter};
}

let lastFreq = 65.41;
function scheduler() {
  const secondsPerStep = 60.0 / params.tempo / 4;

  while(nextNoteTime < ctx.currentTime + 0.1) {
    const step = seq[currentStep];

    // LEDs
    document.querySelectorAll('.led').forEach((led,i) => {
      led.classList.toggle('on', i === currentStep);
    });
    document.querySelectorAll('.step').forEach((s,i) => {
      s.classList.toggle('playing', i === currentStep);
    });

    if(step.note!== 'OFF') {
      const freq = noteFreq[step.note];
      const isSlide = step.slide && lastFreq;
      const dur = isSlide? secondsPerStep * 2 : secondsPerStep * 0.9;

      create303Voice(freq, nextNoteTime, step.slide, step.accent, dur);
      lastFreq = freq;
    }

    nextNoteTime += secondsPerStep;
    currentStep = (currentStep + 1) % 16;
  }

  if(isRunning) scheduleTimer = setTimeout(scheduler, 25);
}

// Activar audio en primer click
document.body.addEventListener('click', () => {
  if(ctx.state === 'suspended') ctx.resume();
}, {once: true});
</script>
</body>
</html>
